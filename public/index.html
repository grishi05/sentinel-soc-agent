<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sentinel — AI SOC Triage Agent</title>
    <style>
      :root {
        --bg: #0a0e14;
        --panel: #111722;
        --panel-2: #161e2b;
        --line: #1f2a3a;
        --txt: #d6e1f0;
        --muted: #7d8da5;
        --accent: #36c6a0;
        --accent-2: #4a9eff;
        --user: #1b2740;
        --low: #3a9d5d;
        --medium: #d9a23a;
        --high: #e0683a;
        --critical: #e0455a;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: radial-gradient(1200px 600px at 80% -10%, #122035 0%, var(--bg) 55%);
        color: var(--txt);
        font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      header {
        display: flex; align-items: center; gap: 12px;
        padding: 14px 22px; border-bottom: 1px solid var(--line);
        background: rgba(10, 14, 20, 0.7); backdrop-filter: blur(6px);
        position: sticky; top: 0; z-index: 5;
      }
      .logo {
        width: 34px; height: 34px; border-radius: 9px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: grid; place-items: center; font-weight: 800; color: #04121a;
      }
      header h1 { font-size: 16px; margin: 0; letter-spacing: .3px; }
      header .sub { color: var(--muted); font-size: 12.5px; margin-top: 1px; }
      header .spacer { flex: 1; }
      .ghost {
        background: transparent; color: var(--muted);
        border: 1px solid var(--line); border-radius: 8px;
        padding: 7px 12px; cursor: pointer; font-size: 13px;
      }
      .ghost:hover { color: var(--txt); border-color: var(--accent); }

      main {
        display: grid; grid-template-columns: 1fr 360px; gap: 16px;
        max-width: 1200px; margin: 0 auto; padding: 16px; height: calc(100vh - 63px);
      }
      @media (max-width: 880px) { main { grid-template-columns: 1fr; height: auto; } }

      .card {
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 14px; display: flex; flex-direction: column; min-height: 0;
      }
      .chat { overflow: hidden; }
      #messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
      .msg { display: flex; gap: 10px; max-width: 92%; }
      .msg .avatar {
        flex: 0 0 28px; width: 28px; height: 28px; border-radius: 7px;
        display: grid; place-items: center; font-size: 13px; font-weight: 700;
      }
      .msg.user { align-self: flex-end; flex-direction: row-reverse; }
      .msg .bubble { padding: 11px 14px; border-radius: 12px; border: 1px solid var(--line); }
      .msg.assistant .avatar { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #04121a; }
      .msg.assistant .bubble { background: var(--panel-2); }
      .msg.user .avatar { background: var(--user); color: var(--accent-2); }
      .msg.user .bubble { background: var(--user); }
      .bubble b { color: #fff; }
      .bubble ul { margin: 6px 0; padding-left: 18px; }
      .bubble code { background: #0c1118; padding: 1px 5px; border-radius: 5px; font-size: 13px; }

      .composer { border-top: 1px solid var(--line); padding: 12px; }
      .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
      .chip {
        font-size: 12px; color: var(--muted); background: var(--panel-2);
        border: 1px solid var(--line); border-radius: 20px; padding: 5px 11px; cursor: pointer;
      }
      .chip:hover { color: var(--txt); border-color: var(--accent); }
      .inputRow { display: flex; gap: 10px; }
      textarea {
        flex: 1; resize: none; height: 60px; background: var(--panel-2); color: var(--txt);
        border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font: inherit;
      }
      textarea:focus { outline: none; border-color: var(--accent); }
      .send {
        align-self: stretch; padding: 0 18px; border: none; border-radius: 10px; cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #04121a; font-weight: 700;
      }
      .send:disabled { opacity: .5; cursor: progress; }

      /* sidebar */
      .side { overflow-y: auto; padding: 16px; gap: 16px; display: flex; flex-direction: column; }
      .side h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; }
      .verdict {
        border: 1px solid var(--line); border-radius: 12px; padding: 14px; background: var(--panel-2);
      }
      .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
      .badge { font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 20px; color: #06101a; }
      .sev-Low { background: var(--low); } .sev-Medium { background: var(--medium); }
      .sev-High { background: var(--high); } .sev-Critical { background: var(--critical); color: #fff; }
      .vd { background: #26344a; color: var(--txt); }
      .verdict .title { font-weight: 700; margin-bottom: 4px; }
      .verdict .summary { color: var(--muted); font-size: 13.5px; }
      .verdict .label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 10px 0 4px; }
      .iocs { display: flex; flex-wrap: wrap; gap: 6px; }
      .ioc { font-family: ui-monospace, monospace; font-size: 12px; background: #0c1118; border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; word-break: break-all; }
      .verdict ul { margin: 4px 0 0; padding-left: 17px; font-size: 13px; color: var(--txt); }
      .empty { color: var(--muted); font-size: 13px; border: 1px dashed var(--line); border-radius: 12px; padding: 16px; text-align: center; }
      .caseItem { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; background: var(--panel-2); }
      .caseItem .ct { font-weight: 600; font-size: 13.5px; }
      .caseItem .cs { color: var(--muted); font-size: 12px; margin-top: 2px; }
      .typing { color: var(--muted); font-size: 13px; font-style: italic; }
      .dot { animation: blink 1.2s infinite; } .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
      @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">S</div>
      <div>
        <h1>Sentinel</h1>
        <div class="sub">AI SOC triage agent · Llama 3.3 on Cloudflare Workers AI</div>
      </div>
      <div class="spacer"></div>
      <button class="ghost" id="reset">Clear session</button>
    </header>

    <main>
      <section class="card chat">
        <div id="messages"></div>
        <div class="composer">
          <div class="chips" id="chips"></div>
          <div class="inputRow">
            <textarea id="input" placeholder="Paste an alert, log line, suspicious email, or indicator… (Enter to send, Shift+Enter for newline)"></textarea>
            <button class="send" id="send">Triage</button>
          </div>
        </div>
      </section>

      <aside class="card side">
        <div>
          <h2>Latest verdict</h2>
          <div id="verdict"><div class="empty">No triage yet. Submit an artifact to begin.</div></div>
        </div>
        <div>
          <h2>Case file (session memory)</h2>
          <div id="cases"><div class="empty">Saved cases will accumulate here.</div></div>
        </div>
      </aside>
    </main>

    <script>
      // ---- session id: stable per browser, maps to one Durable Object instance ----
      const SID_KEY = "sentinel_session_id";
      let sessionId = localStorage.getItem(SID_KEY);
      if (!sessionId) {
        sessionId = "s-" + (crypto.randomUUID ? crypto.randomUUID().replace(/-/g, "") : Date.now() + "" + Math.random().toString(16).slice(2));
        localStorage.setItem(SID_KEY, sessionId);
      }

      const $ = (id) => document.getElementById(id);
      const messagesEl = $("messages"), verdictEl = $("verdict"), casesEl = $("cases");

      const EXAMPLES = [
        { label: "Phishing email", text: "Subject: Urgent: your account is locked\nFrom: security@paypa1-support[.]com\nReply within 24h or lose access. Verify here: hxxps://secure-paypal-login[.]tk/verify?id=8842\nThanks, PayPal Support" },
        { label: "Suspicious proxy log", text: "2026-06-28 04:12:33 user=jdoe src=10.2.4.18 action=ALLOW url=http://193.0.113.77/gate.php bytes_out=2200000 ua=curl/8.4" },
        { label: "Lone indicator", text: "Is hxxp://bit[.]ly/4xZq9 safe to click?" },
        { label: "Recon scan", text: "IDS: 50 SYN packets to ports 22,80,443,3389 from 198.51.100.23 in 4s" },
      ];

      function escapeHtml(s) { return s.replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

      // tiny markdown-ish renderer for assistant text
      function format(text) {
        const lines = escapeHtml(text).split("\n");
        let html = "", inList = false;
        for (let line of lines) {
          line = line.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>").replace(/`(.+?)`/g, "<code>$1</code>");
          const m = line.match(/^\s*[-*•]\s+(.*)$/);
          if (m) { if (!inList) { html += "<ul>"; inList = true; } html += "<li>" + m[1] + "</li>"; }
          else { if (inList) { html += "</ul>"; inList = false; } html += line ? line + "<br>" : ""; }
        }
        if (inList) html += "</ul>";
        return html;
      }

      function addMessage(role, text) {
        const wrap = document.createElement("div");
        wrap.className = "msg " + role;
        wrap.innerHTML =
          '<div class="avatar">' + (role === "user" ? "You" : "S") + "</div>" +
          '<div class="bubble">' + (role === "assistant" ? format(text) : escapeHtml(text)) + "</div>";
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return wrap;
      }

      function renderVerdict(t) {
        if (!t) return;
        verdictEl.innerHTML =
          '<div class="verdict">' +
            '<div class="badges">' +
              '<span class="badge sev-' + t.severity + '">' + t.severity + "</span>" +
              '<span class="badge vd">' + escapeHtml(t.verdict) + "</span>" +
            "</div>" +
            '<div class="title">' + escapeHtml(t.title) + "</div>" +
            '<div class="summary">' + escapeHtml(t.summary) + "</div>" +
            (t.indicators && t.indicators.length
              ? '<div class="label">Indicators</div><div class="iocs">' + t.indicators.map((i) => '<span class="ioc">' + escapeHtml(i) + "</span>").join("") + "</div>"
              : "") +
            (t.recommended_actions && t.recommended_actions.length
              ? '<div class="label">Recommended actions</div><ul>' + t.recommended_actions.map((a) => "<li>" + escapeHtml(a) + "</li>").join("") + "</ul>"
              : "") +
          "</div>";
      }

      function renderCases(cases) {
        if (!cases || !cases.length) { casesEl.innerHTML = '<div class="empty">Saved cases will accumulate here.</div>'; return; }
        casesEl.innerHTML = cases.map((c) =>
          '<div class="caseItem"><div class="badges"><span class="badge sev-' + c.severity + '">' + c.severity + "</span></div>" +
          '<div class="ct">' + escapeHtml(c.title) + "</div>" +
          '<div class="cs">' + escapeHtml(c.verdict) + " · " + new Date(c.created_at).toLocaleTimeString() + "</div></div>"
        ).join("");
      }

      let busy = false;
      async function send(text) {
        text = (text || $("input").value).trim();
        if (!text || busy) return;
        busy = true; $("send").disabled = true;
        $("input").value = "";
        addMessage("user", text);
        const typing = addMessage("assistant", "");
        typing.querySelector(".bubble").innerHTML = '<span class="typing">Sentinel is triaging<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>';

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ sessionId, message: text }),
          });
          const data = await res.json();
          typing.querySelector(".bubble").innerHTML = format(data.assistant || "(no response)");
          if (data.triage) renderVerdict(data.triage);
          renderCases(data.cases);
        } catch (e) {
          typing.querySelector(".bubble").innerHTML = "⚠️ Request failed: " + escapeHtml(String(e));
        } finally {
          busy = false; $("send").disabled = false; $("input").focus();
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }

      async function loadHistory() {
        try {
          const res = await fetch("/api/history?sessionId=" + encodeURIComponent(sessionId));
          const data = await res.json();
          if (data.messages && data.messages.length) {
            messagesEl.innerHTML = "";
            data.messages.forEach((m) => addMessage(m.role === "user" ? "user" : "assistant", m.content));
          } else {
            addMessage("assistant", "**Sentinel online.** Paste an alert, log line, suspicious email, or single indicator and I'll triage it: extract IOCs, risk-score them, assign a severity, and recommend next actions. Findings are saved to this session's case file.");
          }
          renderCases(data.cases);
        } catch {
          addMessage("assistant", "Sentinel online. Submit an artifact to begin.");
        }
      }

      async function reset() {
        await fetch("/api/reset", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ sessionId }) });
        messagesEl.innerHTML = ""; verdictEl.innerHTML = '<div class="empty">No triage yet. Submit an artifact to begin.</div>';
        renderCases([]); loadHistory();
      }

      // wire up
      EXAMPLES.forEach((ex) => {
        const c = document.createElement("div"); c.className = "chip"; c.textContent = ex.label;
        c.onclick = () => { $("input").value = ex.text; $("input").focus(); };
        $("chips").appendChild(c);
      });
      $("send").onclick = () => send();
      $("reset").onclick = reset;
      $("input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      });
      loadHistory();
    </script>
  </body>
</html>
